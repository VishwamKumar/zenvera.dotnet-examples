name: PR validation

on:
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            NuGet.config

      - name: Configure GitHub Packages credentials
        shell: bash
        env:
          GH_PACKAGES_READ_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          token="${GH_PACKAGES_READ_TOKEN:-${GH_PACKAGES_TOKEN:-${GITHUB_TOKEN}}}"
          user="${GH_PACKAGES_USER:-${GITHUB_ACTOR}}"
          echo "NuGetPackageSourceCredentials_github-packages=Username=${user};Password=${token};ValidAuthenticationTypes=Basic" >> "$GITHUB_ENV"

      - name: Validate tracked example manifest
        shell: pwsh
        run: ./scripts/ci/Test-ExampleBuildManifest.ps1

      - name: Check secrets, generated files, Markdown links, and Compose
        shell: pwsh
        run: ./scripts/ci/Test-RepositoryHygiene.ps1

  compile-and-test:
    needs: repository-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: [api-styles, authentication, architecture, integration, infrastructure, user-interface]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            NuGet.config

      - name: Configure GitHub Packages credentials
        shell: bash
        env:
          GH_PACKAGES_READ_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
        run: |
          token="${GH_PACKAGES_READ_TOKEN:-${GH_PACKAGES_TOKEN:-${GITHUB_TOKEN}}}"
          user="${GH_PACKAGES_USER:-${GITHUB_ACTOR}}"
          echo "NuGetPackageSourceCredentials_github-packages=Username=${user};Password=${token};ValidAuthenticationTypes=Basic" >> "$GITHUB_ENV"

      - name: Restore enabled examples
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action restore

      - name: Build enabled examples
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action build

      - name: Run enabled tests
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action test

      - name: Validate formatting without rewriting
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action format
