name: Build examples

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  examples:
    name: ${{ matrix.category }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: [api-styles, authentication, architecture, integration, infrastructure, user-interface]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET SDK from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            NuGet.config

      - name: Ensure NuGet cache directory exists
        shell: bash
        run: mkdir -p "$HOME/.nuget/packages"

      - name: Configure GitHub Packages credentials
        shell: bash
        env:
          GH_PACKAGES_READ_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          token="${GH_PACKAGES_READ_TOKEN:-${GH_PACKAGES_TOKEN:-${GITHUB_TOKEN}}}"
          user="${GH_PACKAGES_USER:-${GITHUB_ACTOR}}"
          echo "NuGetPackageSourceCredentials_github-packages=Username=${user};Password=${token};ValidAuthenticationTypes=Basic" >> "$GITHUB_ENV"

      - name: Validate manifest and show tracked exclusions
        shell: pwsh
        run: ./scripts/ci/Test-ExampleBuildManifest.ps1

      - name: Restore
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action restore

      - name: Build
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action build

      - name: Test
        shell: pwsh
        run: ./scripts/ci/Invoke-ExampleValidation.ps1 -Category '${{ matrix.category }}' -Action test

  infrastructure-integration-tests:
    name: Infrastructure-dependent tests
    runs-on: ubuntu-latest
    if: ${{ false }} # Enable when a manifest entry gains an integration test requiring Compose services.
    steps:
      - name: No infrastructure integration tests are currently declared
        run: echo "Compile validation is independent from Redis, RabbitMQ, SQL Server, and MongoDB."
